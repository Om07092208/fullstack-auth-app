services:
  backend:
    image: ${DOCKER_USERNAME}/fullstack-auth-backend:latest
    container_name: auth-backend
    env_file:
      - ./backend.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    image: ${DOCKER_USERNAME}/fullstack-auth-frontend:latest
    container_name: auth-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
